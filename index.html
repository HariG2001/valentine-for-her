<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine Sujithra Hariharan ? 💝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 90%;
            margin: 20px;
        }

        h1 {
            color: #ff3366;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .question {
            font-size: 2rem;
            margin: 2rem 0;
            color: #333;
        }

        .buttons {
            position: relative;
            height: 150px;
            margin: 2rem 0;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-yes {
            background-color: #4CAF50;
            color: white;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .btn-yes:hover {
            background-color: #45a049;
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-no {
            background-color: #ff4444;
            color: white;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.2s ease;
            z-index: 1;
        }

        .btn-no:hover {
            background-color: #ff6666;
        }

        .photos-section {
            margin-top: 2rem;
            animation: fadeIn 1s ease;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 2rem 0;
        }

        .photo-card {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-5px);
        }

        .photo-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .photo-caption {
            color: #666;
            font-size: 0.9rem;
            padding: 5px;
        }

        .message {
            font-size: 2rem;
            color: #ff3366;
            margin: 2rem 0;
            padding: 1rem;
            animation: heartbeat 1.5s ease infinite;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: rgba(255, 51, 102, 0.3);
            font-size: 20px;
            animation: float 3s ease infinite;
        }
    </style>
</head>
<body>
    <!-- Floating hearts background -->
    <div class="floating-hearts" id="hearts"></div>

    <div class="container" id="mainContainer">
        <h1>💝 Happy Valentine's Day! 💝</h1>
        
        <!-- Question Section -->
        <div id="questionSection">
            <div class="question">Will you be my Valentine? 🥺</div>
            <div class="buttons">
                <button class="btn btn-yes" id="yesBtn">YES! 💖</button>
                <button class="btn btn-no" id="noBtn">No 😢</button>
            </div>
        </div>

        <!-- Photos Section (initially hidden) -->
        <div id="photosSection" class="photos-section hidden">
            <h2>Our Beautiful Memories 📸</h2>
            <div class="photo-grid" id="photoGrid"></div>
            <div class="message" id="finalMessage"></div>
        </div>
    </div>

    <script>
        // Function to create floating hearts
        function createFloatingHearts() {
            const heartsContainer = document.getElementById('hearts');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heart.style.fontSize = (Math.random() * 30 + 10) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        // Get elements
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionSection = document.getElementById('questionSection');
        const photosSection = document.getElementById('photosSection');
        const photoGrid = document.getElementById('photoGrid');
        const finalMessage = document.getElementById('finalMessage');

        // Function to move the No button
        function moveNoButton() {
            const container = document.querySelector('.buttons');
            const containerRect = container.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            
            // Calculate safe boundaries (keep button within container)
            const maxX = containerRect.width - btnRect.width;
            const maxY = containerRect.height - btnRect.height;
            
            // Generate random position within container
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            // Apply new position
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.transform = 'none';
        }

        // Add hover effect to No button
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            moveNoButton();
        });

        // Handle Yes button click
        yesBtn.addEventListener('click', function() {
            // Hide question section
            questionSection.classList.add('hidden');
            
            // Show photos section
            photosSection.classList.remove('hidden');
            
            // Generate photo grid
            createPhotoGrid();
            
            // Show final message after photos
            setTimeout(() => {
                finalMessage.innerHTML = "I will be there for you always 💕";
            }, 500);
        });

        // Function to create photo grid
function createPhotoGrid() {
    // FIXED: Changed 'emoji' to 'url' and used correct raw GitHub URLs
    const photos = [
        { 
            url: "https://raw.githubusercontent.com/HariG2001/valentine-for-her/main/images/IMG_20201018_093639.jpg", 
            caption: "Our first date" 
        },
        { 
            url: "https://raw.githubusercontent.com/HariG2001/valentine-for-her/main/images/IMG-20230319-WA0004.jpg", 
            caption: "Beautiful days together" 
        },           
        { 
            url: "https://raw.githubusercontent.com/HariG2001/valentine-for-her/main/images/IMG-20230730-WA0025.jpg", 
            caption: "Together Forever" 
        },
        { 
            url: "https://raw.githubusercontent.com/HariG2001/valentine-for-her/main/images/InShot_20230207_214651088.jpg", 
            caption: "Till the End" 
        }
    ];

    // Clear existing photos
    photoGrid.innerHTML = '';

    // Create photo cards
    photos.forEach(photo => {
        const photoCard = document.createElement('div');
        photoCard.className = 'photo-card';
        
        photoCard.innerHTML = `
            <img src="${photo.url}" alt="${photo.caption}" 
                 style="width:100%; height:200px; object-fit:cover; border-radius:10px; margin-bottom:10px;"
                 onerror="this.onerror=null; this.src='https://via.placeholder.com/300x200?text=Loading+Error';">
            <div class="photo-caption">${photo.caption}</div>
        `;
        
        photoGrid.appendChild(photoCard);
    });

    // Add animation to each photo card
    const cards = document.querySelectorAll('.photo-card');
    cards.forEach((card, index) => {
        card.style.animation = `fadeIn 0.5s ease ${index * 0.1}s forwards`;
        card.style.opacity = '0';
    });
}

        // Initialize floating hearts
        createFloatingHearts();

        // Add some playful messages when trying to click No
        let noClickCount = 0;
        const messages = [
            "Nice try! 😏",
            "You can't escape! 💕",
            "Just say Yes! 🥺",
            "Why you running? 🏃‍♀️",
            "There's no escape! 😘",
            "Yes is the only option! 💖"
        ];

        noBtn.addEventListener('mouseover', function() {
            noClickCount++;
            if (noClickCount % 3 === 0) {
                const speech = document.createElement('div');
                speech.style.position = 'fixed';
                speech.style.top = '20%';
                speech.style.left = '50%';
                speech.style.transform = 'translateX(-50%)';
                speech.style.backgroundColor = 'rgba(255, 255, 255, 0.9)';
                speech.style.padding = '10px 20px';
                speech.style.borderRadius = '20px';
                speech.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
                speech.style.zIndex = '1000';
                speech.style.animation = 'fadeIn 0.3s ease';
                speech.textContent = messages[noClickCount % messages.length];
                
                document.body.appendChild(speech);
                
                setTimeout(() => {
                    speech.remove();
                }, 1000);
            }
        });

        // Prevent No button from being clicked by making it super fast
        document.addEventListener('mousemove', function(e) {
            if (!photosSection.classList.contains('hidden')) return;
            
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            const btnRect = noBtn.getBoundingClientRect();
            
            // If mouse gets too close to No button, move it
            const distance = Math.sqrt(
                Math.pow(mouseX - (btnRect.left + btnRect.width/2), 2) +
                Math.pow(mouseY - (btnRect.top + btnRect.height/2), 2)
            );
            
            if (distance < 100) {
                moveNoButton();
            }
        });
    </script>
</body>

</html>
